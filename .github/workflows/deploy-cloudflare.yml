name: Deploy authenticated tree map to Cloudflare

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cloudflare-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      TREE_SHEET_ID: ${{ vars.TREE_SHEET_ID }}

    steps:
      - uses: actions/checkout@v7

      - uses: quarto-dev/quarto-actions/setup@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.5.3"
          use-public-rspm: true

      - uses: r-lib/actions/setup-renv@v2

      - name: Authenticate to Google Sheets
        id: google-auth
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          create_credentials_file: false
          token_format: access_token
          access_token_scopes: https://www.googleapis.com/auth/spreadsheets.readonly

      - name: Fetch private source sheet
        env:
          GOOGLE_ACCESS_TOKEN: ${{ steps.google-auth.outputs.access_token }}
          TREE_SHEET_RANGE: ${{ vars.TREE_SHEET_RANGE }}
        run: Rscript scripts/fetch_sheet.R "$RUNNER_TEMP/trees.csv"

      - name: Render authenticated site
        env:
          TREE_DATA_FILE: ${{ runner.temp }}/trees.csv
          TREE_SITE_VARIANT: cloudflare
        run: quarto render --profile cloudflare

      - name: Verify authenticated artifact
        run: Rscript scripts/verify_build.R cloudflare _site-cloudflare

      - name: Deploy unreachable Worker assets
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4"
          command: deploy --config wrangler.jsonc
